<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColorMixer Pro: Free Online RGB Color Blender & Palette Generator</title>
    <meta name="description" content="Blend two colors instantly with ColorMixer Pro. A free, privacy-focused online tool for web designers to create mixed color values and perfect UI palettes.">
    <meta name="keywords" content="color mixer, rgb blender, online color tool, hex code generator, web design color mixer, css color blending">
    <link rel="canonical" href="https://haisumapku2008-prog.github.io/ColorMixer/" />
    
    <meta property="og:title" content="ColorMixer Pro - Simple Color Blending">
    <meta property="og:description" content="Generate custom colors by blending two inputs. Fast, local, and free for designers.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://haisumapku2008-prog.github.io/ColorMixer/">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { background: var(--card); padding: 2rem; border-radius: 12px; border: 1px solid #334155; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .preview-box { height: 180px; width: 100%; border-radius: 8px; margin-bottom: 1.5rem; transition: background 0.3s ease; border: 2px solid #334155; }
        .controls { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .control-group { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        input[type="color"] { width: 100%; height: 50px; border: none; cursor: pointer; background: transparent; }
        .hex-display { font-family: monospace; font-size: 1.5rem; text-align: center; color: #38bdf8; margin-bottom: 1rem; }
        button { background: #0284c7; color: white; border: none; padding: 0.75rem; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        button:hover { background: #0369a1; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2 style="text-align: center; margin-top: 0;">ColorMixer Pro</h2>
        <div id="preview" class="preview-box" style="background: #808080;"></div>
        <div id="hex" class="hex-display">#808080</div>
        <div class="controls">
            <div class="control-group">
                <label>Color A</label>
                <input type="color" id="colA" value="#ff0000" oninput="calculate()">
            </div>
            <div class="control-group">
                <label>Color B</label>
                <input type="color" id="colB" value="#0000ff" oninput="calculate()">
            </div>
        </div>
        <button onclick="copyToClipboard()">Copy Hex Code</button>
    </div>
    <script>
        function calculate() {
            const hexA = document.getElementById('colA').value;
            const hexB = document.getElementById('colB').value;
            const rgbA = hexToRgb(hexA);
            const rgbB = hexToRgb(hexB);
            const mix = {
                r: Math.round((rgbA.r + rgbB.r) / 2),
                g: Math.round((rgbA.g + rgbB.g) / 2),
                b: Math.round((rgbA.b + rgbB.b) / 2)
            };
            const finalHex = rgbToHex(mix.r, mix.g, mix.b);
            document.getElementById('preview').style.background = finalHex;
            document.getElementById('hex').innerText = finalHex.toUpperCase();
        }
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            return {r, g, b};
        }
        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }
        function copyToClipboard() {
            const hex = document.getElementById('hex').innerText;
            navigator.clipboard.writeText(hex).then(() => alert("Copied: " + hex));
        }
        calculate();
    </script>
</body>
</html>
